name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        working-directory: Frontend
        run: npm ci
      - name: Lint
        working-directory: Frontend
        run: npm run lint --if-present
      - name: Build
        working-directory: Frontend
        env:
          VITE_API_URL: /api
        run: npm run build --if-present
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Lint
        working-directory: backend
        run: npm run lint --if-present
      - name: Test
        working-directory: backend
        run: npm test --if-present
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend

  docker:
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image tags
        run: |
          image_owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_OWNER=${image_owner}" >> "$GITHUB_ENV"

          frontend_tags="ghcr.io/${image_owner}/dharma-frontend:latest"
          backend_tags="ghcr.io/${image_owner}/dharma-backend:latest"

          if [ -n "$DOCKERHUB_USERNAME" ]; then
            dockerhub_owner="${DOCKERHUB_USERNAME,,}"
            echo "DOCKERHUB_OWNER=${dockerhub_owner}" >> "$GITHUB_ENV"
            frontend_tags="${frontend_tags},docker.io/${dockerhub_owner}/dharma-frontend:latest"
            backend_tags="${backend_tags},docker.io/${dockerhub_owner}/dharma-backend:latest"
          fi

          echo "FRONTEND_IMAGE_TAGS=${frontend_tags}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE_TAGS=${backend_tags}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: Frontend
          file: Frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE_TAGS }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE_TAGS }}

  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_BACKEND_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
      RENDER_FRONTEND_SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY is not configured; skipping deploy."
            exit 0
          fi

          service_ids=()

          if [ -n "$RENDER_BACKEND_SERVICE_ID" ]; then
            service_ids+=("$RENDER_BACKEND_SERVICE_ID")
          fi

          if [ -n "$RENDER_FRONTEND_SERVICE_ID" ]; then
            service_ids+=("$RENDER_FRONTEND_SERVICE_ID")
          fi

          if [ ${#service_ids[@]} -eq 0 ] && [ -n "$RENDER_SERVICE_ID" ]; then
            service_ids+=("$RENDER_SERVICE_ID")
          fi

          if [ ${#service_ids[@]} -eq 0 ]; then
            echo "No Render service IDs are configured; skipping deploy."
            exit 0
          fi

          for service_id in "${service_ids[@]}"; do
            echo "Triggering Render deploy for service ${service_id}"
            curl --fail-with-body -sS -X POST "https://api.render.com/v1/services/${service_id}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}'
            echo
          done
